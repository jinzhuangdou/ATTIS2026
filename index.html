<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATTIS Abstract Review Portal</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #10243e;
      --muted: #5f7189;
      --line: #dce3ef;
      --brand: #1e5ea8;
      --brand2: #0f7f75;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .top {
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      color: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .top h1 { margin: 0; font-size: 24px; }
    .top p { margin: 6px 0 0 0; opacity: 0.95; }
    .toolbar {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      display: grid;
      gap: 10px;
      grid-template-columns: 260px 1fr auto auto auto;
      align-items: center;
      margin-bottom: 14px;
    }
    select, input[type="search"], button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      background: #fff;
    }
    button {
      width: auto;
      cursor: pointer;
      background: #fff;
      font-weight: 600;
    }
    button.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    .meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .grid {
      display: grid;
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f9fbff;
    }
    .title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      font-size: 12px;
      border-radius: 999px;
      background: #eaf1fd;
      color: #184f90;
      padding: 4px 10px;
      border: 1px solid #d3e0f7;
    }
    .card-body {
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 14px;
    }
    .section h3 {
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .text-block {
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 14px;
    }
    .small {
      font-size: 13px;
      color: var(--muted);
      margin: 2px 0;
      white-space: pre-wrap;
    }
    .scores {
      display: grid;
      grid-template-columns: 1fr 100px;
      gap: 8px 10px;
      align-items: center;
    }
    .scores label {
      font-size: 14px;
      font-weight: 600;
    }
    .scores input {
      text-align: center;
    }
    .total {
      margin-top: 8px;
      font-weight: 700;
      color: #174f8d;
    }
    .note {
      width: 100%;
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font-family: inherit;
      resize: vertical;
    }
    .empty {
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 980px) {
      .toolbar { grid-template-columns: 1fr; }
      .card-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>ATTIS Abstract Review Portal</h1>
      <p>Select reviewer, read full abstract, score 4 criteria (0-10), and export your scores.</p>
    </div>

    <div class="toolbar">
      <select id="reviewerSelect"></select>
      <input id="searchBox" type="search" placeholder="Search by title, PI, keyword..." />
      <button id="resetBtn">Reset Current Reviewer Scores</button>
      <button id="exportReviewerBtn" class="primary">Export Reviewer CSV</button>
      <button id="exportAllBtn">Export All CSV</button>
    </div>

    <div class="meta" id="metaLine"></div>
    <div id="list" class="grid"></div>
  </div>

  <script>
    const REVIEWERS = ["Amy Wang", "Chen, Jake Y", "Chen, Jin (Campus)", "Chong, Zechen", "Garmire, Lana", "Jinzhuang Dou", "Mosa, Abu S", "Osborne, John D"];
    const ABSTRACTS = [{"abstract_id": "1", "source_row": 2, "pi": "Shivani Sharma", "title": "Artificial Intelligence in Nutrition: Transforming Personalized Health and Dietary Management", "authors": "Manisha Arora, Shivani Sharma", "affiliations": "Department of Biomedical Sciences, Mercer School of Medicine, Columbus, GA \nDepartment of Pathology and Clinical Sciences, Mercer School of Medicine, Columbus, GA", "email": "drmanishaarora@gmail.com", "phone": "7063925165,7065731123", "abstract": "Artificial Intelligence (AI) is rapidly transforming the field of nutrition by enabling personalized dietary recommendations, improving disease prevention strategies, and enhancing food system sustainability. With the integration of machine learning, big data analytics, and digital health tools, AI has the potential to revolutionize how nutritional information is assessed, interpreted, and applied. This review explores the current applications of AI in nutrition, its benefits, limitations, and future implications for healthcare and public health.", "keywords": "Nutrition,Microbiome ,obesity ,diabetes", "reviewers": ["Chong, Zechen", "Amy Wang", "Osborne, John D", "Garmire, Lana", "Chen, Jake Y"]}, {"abstract_id": "2", "source_row": 3, "pi": "Brittany Lasseigne", "title": "ZAK (analyZing Allelic Knowledge): An AI-Powered Framework for Clinical Variant Evaluation", "authors": "Brittany N. Lasseigne", "affiliations": "1. Department of Cell, Developmental and Integrative Biology, Heersink School of Medicine, The University of Alabama at Birmingham, Birmingham, AL, USA.", "email": "bnp0001@uab.edu", "phone": "(205) 934-8156", "abstract": "The interpretation of sequence variants using American College of Medical Genetics (ACMG)/Association for Molecular Pathology (AMP) guidelines is highly complex, and currently, no single variant database covers all necessary annotation needs. Additionally, evaluating strategies for upgrading or downgrading variant pathogenic designations is challenging, especially for research labs, because of the significant curation time to aggregate fragmented variant data from multiple databases and the required specialized knowledge. To address this bottleneck, we are developing ZAK (analyZing Allelic Knowledge), an AI-enhanced tool designed to assist classify variants utilizing the Bayesian point-based framework while bridging critical data gaps. ZAK employs a resilient hybrid database architecture, leveraging ClinVar E-utilities for clinical metadata (i.e., review status, submitter counts) and Open Targets for enrichment data (i.e., population frequencies in-silico predictions). Crucially, ZAK integrates flexible artificial intelligence (AI) components (via the Anthropic application programming interface (API) or local Ollama models) to parse natural language evidence descriptions, extract applicable ACMG/AMP codes, justify code selections, and generate narrative reports. We are developing ZAK using AI-assist via an iterative \"evaluate first, implement second\" approach. While Large Language Models (LLMs) effectively interpreted high-level coding intent, strict domain expertise was essential for course correction, validating logic, and refining the user interface. Integrating AI and automated data retrieval surfaced distinct pitfalls and opportunities. For example, purely automated data scraping revealed pitfalls like lagging third-party aggregators and the fragility of string matching for clinical review statuses. We mitigated these issues by building non-blocking fallback strategies and rigorous integration testing. Conversely, AI integration presented immense opportunities for complex reasoning. For example, ZAK successfully uses AI to automatically flag conflicting evidence, identify deprecated codes (e.g., PP5/BP6), and cross-reference ClinGen Variant Curation Expert Panel (VCEP) rules. ZAK demonstrates the high value of integrating AI into variant analysis. Future directions focus on expanding agentic capabilities, including anticipating updated evidence code guidelines in 2026, deploying an automated literature search agent to pre-populate evidence checklists, and providing literature-informed suggestions that guide users on concrete next steps to confidently change a variant's classification tier.", "keywords": "AI, LLM, software, variant analysis", "reviewers": ["Chong, Zechen", "Mosa, Abu S", "Jinzhuang Dou", "Chen, Jin (Campus)", "Garmire, Lana"]}, {"abstract_id": "3", "source_row": 4, "pi": "", "title": "Cardiac Autonomic Dysfunction and Intracranial Pressure Instability Predict Mortality in Subarachnoid Hemorrhage: A Multimodal Physiologic Waveform Study", "authors": "Ibukun Mary Folorunso M.S, Caitlin Smith M.S, Kameshwari Soundarajan M.S, Ryan Melvin PhD, Ryan Godwin PhD, Tumul Chowdhury, MD, DM, FRCPC, MSc.", "affiliations": "Department of Anesthesiology and Perioperative Medicine, University of Alabama at Birmingham Heersink School of Medicine, Birmingham, Alabama, USA.", "email": "imfoloru@uab.edu", "phone": "2056440150", "abstract": "Background\nSubarachnoid hemorrhage (SAH) is associated with high early mortality, yet current risk stratification relies primarily on clinical grading scales and neuroimaging, which incompletely reflect evolving physiologic instability. High-resolution physiologic waveforms continuously capture dynamic changes in autonomic regulation, hemodynamic stability, and cerebrovascular compliance. These signals represent a rich but underutilized source of clinical information that may enable improved outcome prediction and data-driven risk stratification.\n\nObjective\nTo evaluate whether variability features derived from arterial blood pressure (ABP), electrocardiogram (ECG), and intracranial pressure (ICP) waveforms improve prediction of 30-day mortality in patients with SAH using multimodal machine learning approaches.\n\nMethods\nHigh-resolution ABP, ECG, and ICP waveforms were processed using a reproducible, configuration-driven pipeline incorporating signal harmonization, modality-specific artifact rejection, and beat and pulse detection. Variability-focused features were extracted within fixed 300-second windows and included time-domain, frequency-domain, nonlinear, and waveform-level metrics capturing physiologic variability and complexity. Machine learning models, including Elastic Net, Lasso, Ridge logistic regression, and Random Forest, were trained and evaluated using cross-validation on single-modality and multimodal feature sets to predict 30-day mortality.\n\nResults\nA total of 413 patients were included, with 97 deaths (23.5% 30-day mortality). Among single-modality models, ECG demonstrated the strongest performance (ROC-AUC 0.709±0.052). The most informative ECG features included low-frequency heart rate variability power (lnLF), sample entropy, and root mean square of successive differences (RMSSD), suggesting differences in cardiac variability and physiologic complexity between survivors and non-survivors. ABP and ICP models each achieved ROC-AUC of 0.650. Blood pressure variability measures, including MAP standard deviation and diastolic pressure variability, were among the most influential features for ABP, while ICP variability measures, such as relative standard deviation of mean ICP and average real variability, were most informative for ICP.  Combining modalities was associated with improved prediction performance. Multimodal models using all features achieved ROC-AUC of 0.718±0.060. Further improvement was observed after feature selection, where a 39-feature panel derived from top predictors across the waveforms achieved the best performance (ROC-AUC 0.756±0.056; PR-AUC 0.493 ± 0.088), representing a 6.6% absolute improvement over the best single-modality model. The selected features spanned cardiac autonomic, hemodynamic, and intracranial physiologic domains, suggesting complementary predictive value across multimodal physiologic signals.\n\nConclusions\nHigh-resolution physiologic waveforms may provide prognostic information not captured by conventional clinical assessment in SAH. Multimodal variability features derived from physiologic signals improved mortality prediction and may support development of data-driven risk stratification tools and clinical decision support systems in neurocritical care.", "keywords": "Subarachnoid Hemorrhage, Physiologic Waveform, Multimodal Monitoring, Machine Learning, Predictive Modeling, Neurocritical Care", "reviewers": ["Amy Wang", "Chen, Jake Y", "Garmire, Lana", "Chen, Jin (Campus)", "Osborne, John D"]}, {"abstract_id": "4", "source_row": 5, "pi": "Lana?", "title": "Fairness-aware Supervised Hierarchical Contrastive Semantic Learning for Sexual Dimorphism Analysis", "authors": "Euiseong Ko1 (Presenter), Sai Phani Parsa2, Sai Chandra Kosaraju3, Tesfaye B. Mersha4*,\nand Mingon Kang2*", "affiliations": "1: Department of Biomedical Informatics and Data Science, Heersink School of Medicine, University of Alabama at Birmingham, AL, USA; 2: Department of Computer Science, University of Nevada, Las Vegas, NV, USA; 3: Department of Computer Science, California State Polytechnic University, CA, USA; 4: Department of Medicine, Indiana University School of Medicine, IN, USA", "email": "koe@uab.edu", "phone": "(725)300-9197", "abstract": "Background: Sexual dimorphism is a fundamental biological determinant driving systematic differences in disease susceptibility, progression, and clinical outcomes. However, current AI-based genomic models often exhibit algorithmic bias and fail to capture these sex-specific mechanisms, creating a critical barrier to unbiased precision medicine.\nMethods: We propose FairHICON, a fairness-aware supervised hierarchical contrastive learning approach designed to discover unbiased sex-common and sex-specific predictive features. The framework utilizes a multi-branch Siamese architecture integrated with biologically informed neural networks to ensure learned representations are both statistically fair and biologically interpretable.\nResults: Evaluations on cancer and asthma transcriptomic datasets demonstrate that FairHICON significantly outperforms state-of-the-art benchmarks, improving predictive performance by up to 9% while effectively reducing the performance gap between male and female cohorts. Furthermore, prognostic validation confirms that the identified sex-specific pathways stratify patient survival significantly better within their corresponding sex groups.\nConclusions: FairHICON successfully elucidates the molecular heterogeneity of sexual dimorphism while mitigating algorithmic bias, providing a robust computational framework for advancing inclusive precision medicine.", "keywords": "Sexual Dimorphism Analysis, FairnessML, Contrastive Learning, Bioinformatics, Precision Medicine", "reviewers": ["Chong, Zechen", "Mosa, Abu S", "Jinzhuang Dou", "Chen, Jin (Campus)", "Osborne, John D"]}, {"abstract_id": "5", "source_row": 6, "pi": "Lana", "title": "STDrug enables spatially informed personalized drug repurposing from spatial transcriptomics", "authors": "Yiwen Yang (1), Thatchayut Unjitwattana (2), Shu Zhou (1), Suguru Kadomoto (6), Xiaotong Yang (1), Tianao Chen (4), Abdullah Karaaslanli (1), Yuheng Du (1, *), Wanxing Zhang (1), Haodong Liang (5), Xuhui Guo (1,7), Evan T. Keller (6), Lana X. Garmire (1,7)\n\n*: Presenter", "affiliations": "1: Department of Computational Medicine and Bioinformatics, University of Michigan, Ann Arbor, MI, USA; 2: Department of Biomedical Engineering, University of Michigan, Ann Arbor, MI, USA; 3: Department of Biostatistics, University of Michigan, Ann Arbor, MI, USA; 4: Department of Electrical and Computer Engineering, University of Michigan, Ann Arbor, MI, USA; 5: Department of Statistics, University of Michigan, Ann Arbor, MI, USA; 6: Department of Urology, University of Michigan, Ann Arbor, MI, USA; 7: Department of Biomedical Informatics and Data Science, University of Alabama at Birmingham, Birmingham, AL, USA", "email": "yhdu@umich.edu", "phone": "8604716378", "abstract": "Drug repurposing offers a scalable route to accelerate therapeutic discovery, yet existing approaches based on single-cell RNA sequencing (scRNA-seq) often overlook spatial tissue context, limiting their ability to capture microenvironment-dependent drug responses. Here we present STDrug, a spatially informed computational framework that integrates spatial transcriptomics, graph-based modeling, and multimodal learning to enable patient-specific therapeutic prioritization. STDrug identifies and aligns disease and control spatial domains using graph convolutional networks and coherent point drift, and prioritizes candidate drugs through an integrative scoring scheme combining tumor-reversible gene signatures, perturbation-based reversal scores, and knowledge-guided gene weighting within a machine learning framework. By modeling spatial domain interactions alongside predicted drug efficacy and toxicity, STDrug generates robust patient-level drug scores. Across hepatocellular carcinoma and prostate cancer datasets, STDrug outperforms existing single-cell and spatial transcriptomics–based drug repurposing methods, achieving signficantly improved predictive accuracy (AUCs=0.81-0.82) across patients. Validation using large-scale electronic health records and in vitro assays further supports the translational relevance of top-ranked candidates. Taking together, STDrug establishes a generalizable framework for incorporating spatial omics into therapeutic discovery, advancing spatially informed and personalized drug repurposing.", "keywords": "Drug repurposing, spatial transcriptomics, hepatocellular carcinoma, prostate cancer", "reviewers": ["Amy Wang", "Osborne, John D", "Jinzhuang Dou", "Chen, Jin (Campus)", "Chong, Zechen"]}, {"abstract_id": "6", "source_row": 7, "pi": "Lana", "title": "Hierarchically Optimized Methylation Deconvolution Reveals Cell-Type-Resolved Placental Heterogeneity in Preeclampsia", "authors": "Yuheng Du\nShayanki Lahiri\nPaula A Benny\nFadhl M. AlAkwaa\nCameron B Lassiter\nYuansen Liu (Jonathan) - presenter\nYu Liu \nAnnette Lum-Jones\nJoshua Astern\nMaarit Tiirikainen\nLana X Garmire", "affiliations": "Yuheng Du, Ph.D. Student, Department of Computational Medicine and Bioinformatics, University of Michigan, Ann Arbor, MI, USA;\nShayanki Lahiri, Ph.D., Postdoc Researcher, Department of Computational Medicine and Bioinformatics, University of Michigan, Ann Arbor, MI, USA;\nPaula A. Benny, Research Scientist, Department of Obstetrics and Gynecology, University of Hawaii, Honolulu, HI, USA;\nFadhl M. AlAkwaa, Assistant Research Scientist, Department of Neurology, University of Michigan, Ann Arbor, MI, USA;\nCameron B. Lassiter, Research Laboratory Manager, University of Hawaii Cancer Center, Honolulu, HI, USA;\nYuansen (Jonathan) Liu, Undergraduate Student, Department of Mathematics, Washington University in St. Louis, St. Louis, MO, USA;\nYu Liu, Postdoctoral Researcher, Fox Chase Cancer Center, Philadelphia, PA, USA;\nAnnette Lum-Jones, Lab Specialist, University of Hawaii Cancer Center, Honolulu, HI, USA;\nJoshua Astern, Manager, University of Hawaii Biorepository, John A. Burns School of Medicine, Honolulu, HI, USA;\nMaarit Tiirikainen, Genomics Lab Director, University of Hawaii Cancer Center, Honolulu, HI, USA;\nLana X. Garmire, Associate Professor, Department of Computational Medicine and Bioinformatics, University of Michigan, Ann Arbor, MI, USA.", "email": "jonathanliu20040629@gmail.com", "phone": "3143580855", "abstract": "Accurate estimation of cell-type composition from bulk DNA methylation data remains a fundamental challenge due to tissue complexity and limited reference panels. Here, we present HOMED (Hierarchically Optimized Methylation Deconvolution), a novel framework that integrates hierarchical modeling of major cell lineages and subtype structure to improve deconvolution accuracy with the aid of single-cell RNA seq data.\nAcross benchmarking datasets spanning multiple tissues, including placenta, lung, and peripheral blood mononuclear cells (PBMCs), HOMED consistently outperformed existing approaches (EpiSCORE, scDeconv) in recovering ground-truth cell proportions, demonstrating improved robustness and biological fidelity.\nWe applied HOMED to a large placental cohort from the RMATRIX Hawaii Biorepository (169 severe preeclampsia cases and 277 controls). Cell-type-resolved analysis revealed systematic shifts in trophoblast and immune compartments that are concordant with single-cell references. Importantly, incorporating HOMED-derived cell composition enabled more precise downstream analyses, including epigenome-wide association studies and unsupervised subtyping.\nThis approach uncovered two clinically distinct preeclampsia subtypes characterized by divergent cellular compositions and neonatal outcomes. One subtype exhibited pronounced trophoblast dysregulation, altered immune balance, and increased risk of small-for-gestational-age births, while the other more closely resembled control profiles.\nOverall, HOMED provides a generalizable and biologically informed solution for methylation-based deconvolution across tissues. Its application to the placenta demonstrates how resolving cellular heterogeneity can uncover clinically meaningful disease substructure, offering a scalable framework for multi-cohort epigenomic studies.", "keywords": "Methylation Hierarchical Deconvolution Preeclampsia", "reviewers": ["Osborne, John D", "Chen, Jake Y", "Jinzhuang Dou", "Chong, Zechen", "Mosa, Abu S"]}, {"abstract_id": "7", "source_row": 8, "pi": "Lana", "title": "A Multimodal Deep Learning Framework for Jointly Predicting Postpartum Onset of Chronic Disease", "authors": "Xiaotong Yang1; Zicheng Jin2; Lana Garmire2", "affiliations": "1. Department of Bioinformatics, University of Michigan, Ann Arbor, MI, USA\n2. Department of Biomedical Informatics and Data Science, Heersink School of Medicine, University of Alabama at Birmingham, Birmingham, AL, USA", "email": "xtyang@umich.edu", "phone": "7347809575", "abstract": "Background\nPostpartum essential hypertension, type 2 diabetes mellitus, and renal disease represent major long-term cardiovascular, metabolic, and renal sequelae of pregnancy that are epidemiologically linked to gestational complications. The objective of this study was to develop a single multi-modality model to simultaneously predict the time to first postpartum onset of these three conditions using routinely collected EHR data.\n\nMethods\nUsing Michigan Medicine EHR data (2006–2025) and IRB oversight, we analyzed a cohort of patients with single deliveries and &gt;3 months of postpartum follow-up. The study period began three months postpartum to avoid transient conditions. Our multimodal deep learning framework integrates lab tests, diagnosis codes, and medication codes with demographics. A GRU-D encoder processed temporal numeric data to manage missingness via decay mechanisms. Discrete sequential data were transformed into 1,536-dimensional vectors using LLM model and analyzed with transformer encoders using sinusoidal positional encoding. Predictions from three independent heads were trained via multi-task Cox partial likelihood loss. Performance was evaluated using Harrell’s C-index for discrimination, Integrated Brier Score for calibration, and integrated gradient for modality interpretation.\n\nResults\nThe final analytic cohort was 38486 patients, with delivery years spanning 2006–2025 and a median follow-up of [median] years. The proposed multimodal model achieved mean C-indices of 0.80 ± 0.003 for hypertension, 0.85±0.003 for type 2 diabetes, and 0.79±0.003 for renal disease. Patients in different predicted risk groups show significant disease onset timing. The model consistently outperformed or matched benchmark methods (CoxPH-Lasso, DeepSurv, Random Survival Forest). Modality ablation and permutation importance analysis revealed a clear hierarchy: prenatal diagnosis code carried the dominant predictive signal, followed by lab tests. Medication codes contributed marginal incremental value.\n\nConclusion\nA multimodal deep learning framework can accurately and jointly predict the long-term postpartum onset of hypertension, type 2 diabetes, and renal disease. The finding that a labs-plus-diagnoses model captures nearly all discriminative performance, while reducing input complexity, has practical implications for a focused, efficient model deployment.", "keywords": "women's health; EHR; LLM; precision health", "reviewers": ["Amy Wang", "Osborne, John D", "Mosa, Abu S", "Chen, Jake Y", "Jinzhuang Dou"]}, {"abstract_id": "8", "source_row": 9, "pi": "Marian Okon (XULA)", "title": "Precision Immunotherapy Response Prediction in Paediatric Oncology Using Multimodal AI with Single-Cell Spatial Omics and EHRs", "authors": "1: Micheal Olaolu Arowolo\n1: Davis Austria\n2: Ishola\n1: Marian Okon", "affiliations": "1: Department of Public Health Science, Health Informatics Program, Xavier University of Louisiana, United States\n2:", "email": "marowolo@xula.edu", "phone": "5738101778", "abstract": "Immunotherapy has revolutionised paediatric oncology; nonetheless, response rates differ significantly due to tumour heterogeneity and the intricacies of the microenvironment. Electronic health records (EHRs) compile longitudinal clinical and treatment data, but single-cell spatial omics offers remarkable insights into cellular connections. Artificial intelligence (AI) and multimodal data integration present challenges but provide substantial potential for precise treatment outcome prediction. We created a sophisticated multimodal AI framework that integrates transformer-based models for electronic health record (EHR) integration with graph neural networks (GNNs) for spatial omics data. Anonymous electronic health records data, encompassing treatment histories, test findings, and imaging, were correlated with single-cell spatial transcriptomics and proteomics from paediatric cancer tissues (n=150). A diverse array of data kinds was amalgamated using a cross-modal fusion module utilising attention mechanisms. Subsequently, Explainable AI (XAI) techniques were employed in order for identifying critical predictive attributes. Models were developed using 70% of the population via 5-fold cross-validation and subsequently externally validated on a separate paediatric cohort. The integrated model outperformed the individual modalities (spatial omics AUC 0.76; EHR-only AUC 0.71) in predicting immunotherapy response, with an AUC of 0.89. Longitudinal cytokine trajectories derived from electronic health records and spatial ligand-receptor interactions within the tumour microenvironment were critical prognostic indicators. XAI disclosed biologically interpretable markers, including pre-treatment neutrophil-to-lymphocyte ratios and PD-L1 spatial clustering. The approach exhibited reduced prediction bias in marginalised demographic groups and uniformity across different cancer subtypes. Our multimodal AI methodology combines sophisticated spatial omics with clinical data to produce actionable insights for tailored treatment in paediatric oncology. The methodology's scalability and interpretability enhance clinical translation and digital health applications. Federated learning will be utilised in upcoming initiatives to share information among several colleges.", "keywords": "Multimodal AI, Spatial Omics, Immunotherapy Response, Pediatric Oncology, Precision Medicine, Clinical Translation", "reviewers": ["Jinzhuang Dou", "Mosa, Abu S", "Osborne, John D", "Garmire, Lana", "Chong, Zechen"]}, {"abstract_id": "9", "source_row": 10, "pi": "Lana", "title": "PANCDetect: Early Detection of Pancreatic Cancer from Multimodal EHR data with LLM Embeddings", "authors": "Zicheng Jin1,2*, Xuhui Guo1,2*, Zehua Wang1,3*, Qiang Yang4, Xiaotong Yang1, Xinyu Zhang5, Rui Yin4, Lana X. Garmire1,2$", "affiliations": "1: Department of Computational Medicine and Bioinformatics, University of Michigan, Ann Arbor, MI, USA;\n2: Department of Biomedical Informatics and Data Science, University of Alabama at Birmingham, Birmingham, AL, USA;\n3: Current Address: Department of Computer Science, University of Virginia, Charlottesville, VA, USA;\n4: Department of Health Outcomes & Biomedical Informatics, University of Florida, Gainesville, FL, USA;\n5: Department of Mathematics, University of Michigan, Ann Arbor, MI, USA", "email": "xguo4@uab.edu", "phone": "7343588935", "abstract": "Background\nPancreatic cancer (PANC) is often diagnosed at late stages due to the absence of specific early symptoms, resulting in one of the highest cancer mortality rates. While imaging modalities such as MRI and CT offer high diagnostic accuracy, their population-wide application is however impractical due to the cost. Electronic health records (EHRs) provide a routine, easily accessible, longitudinal and scalable data source for risk prediction, particularly for diseases with no specific symptom such as PANC.\nMethod\nWe introduce PANCDetect, a multimodal framework that leverages large language model (LLM)-derived embeddings of diagnoses, procedures, medications, and laboratory tests, and integrates these data modalities through a Transformer-based architecture. We train the model on MarketScan (≈250M patients), and validate it externally on additional large real-world EHR datasets of University of Michigan Precision Health, or UMPH data  (n≈6M patients) and OneFlorida+ data (n≈26M patients). We then fine-tuned the general model on UMPH EHR data. We evaluated the performance of both models using metrics including area under the receiver operating characteristic curve (AUROC) and area under the precision-recall-gain curve (AUPRG). We assessed the top predictive features with integrated gradients (IG).\nResult\nIn the MarketScan cohort, PANCDetect achieved an AUROC of 0.812 and AUPRG of 0.851 at the 6-month prediction window, and an AUROC of 0.735 and AUPRG of 0.629 for 60-month prediction, significantly outperforming CancerRiskNet. External validation on UMPH and OneFlorida+ demonstrated good generalizability, with 6-months AUROC scores of 0.711 and 0.793, respectively. Fine-tuning on UMPH with laboratory data further improved performance, reaching an AUROC of 0.927 and an AUPRG of 0.979 at 6 months. Even at the 60-month horizon, the refined PANCDetect model maintained strong performance, with an AUROC of 0.835 and AUPRG of 0.911. Attribution analysis highlighted type 2 diabetes, pancreatic diseases, personal and family cancer history as the most important risk factors.\nConclusion\nPANCDetect is the state-of-the-art method integrating multimodal EHR data with LLM embeddings for accurate, interpretable, and generalizable early prediction of pancreatic cancer. This framework holds promise for precision screening of high-risk patients, with the potential to improve survival outcomes without increasing healthcare costs.", "keywords": "Pancreatic Cancer, Electronic Health Records, Clinical Informatics, Deep Learning", "reviewers": ["Chen, Jin (Campus)", "Mosa, Abu S", "Chen, Jake Y", "Amy Wang", "Chong, Zechen"]}, {"abstract_id": "10", "source_row": 11, "pi": "Lana", "title": "Linking spatial omics to patient phenotypes at the population scale by BSNMani: Bayesian scalar-on-network regression with manifold learning", "authors": "Tong Liu, Euiseong Ko (Presenter), Yiwen Yang, Haowen Wu, Thatchayut Unjitwattana, Suyuan Wang, Jian Kang, Yijun Li, Lana Garmire", "affiliations": "1: Department of Biostatistics, University of Michigan, Ann Arbor, MI, USA; 2: Department of Biomedical Informatics and Data Science, Heersink School of Medicine, University of Alabama at Birmingham, AL, USA; 3: Department of Computational Medicine and Bioinformatics, University of Michigan, Ann Arbor, MI, USA; 4: Department of Biomedical Engineering, University of Michigan, Ann Arbor, MI, USA; 5: Department of Data Science, Dana-Farber Cancer Institute; Department of Biostatistics, Harvard T.H. Chan School of Public Health, Boston, MA, USA", "email": "koe@uab.edu", "phone": "(725)300-9197", "abstract": "Background: Spatial omics enables the integration of high-dimensional molecular organization with clinical outcomes. However, incorporating spatial single-cell information into predictive models at the population scale remains a significant challenge.\nMethods: To address this, we adapted BSNMani (Bayesian Scalar-on-Network regression with Manifold learning). This framework is designed to integrate subject-specific, spatially informed gene co-expression networks directly into clinical prediction models. We evaluated the framework's predictive performance and ability to utilize cell-type-specific spatial omics data to enhance analytical granularity.\nResults: In benchmark comparisons, feature selection using BSNMani significantly outperformed both Elastic Net and Lasso methods. When applied to the SEA-AD MERFISH transcriptomics cohort, the framework achieved an accuracy of 0.74 for Alzheimer’s disease (AD) prediction. It successfully revealed four distinct gene–gene co-expression subnetworks with clear biological relevance, including pathways related to glutamatergic synapses and neurogenesis. Furthermore, BSNMani achieved strong survival prediction in a separate breast cancer cohort measured by Imaging Mass Cytometry (IMC) (C-index = 0.77), identifying two key prognostic subnetworks.\nConclusions: BSNMani is a powerful, highly interpretable tool that leverages high-dimensional, cell-type-specific spatial omics data for clinical outcome prediction. It scales effectively to population-level analyses across diverse disease settings, revealing deep biological insights while maintaining easy interpretation for clinical application.", "keywords": "Spatial omics, Bayesian scalar-on-network regression, Manifold learning, Gene co-expression networks, Single-cell", "reviewers": ["Chen, Jake Y", "Jinzhuang Dou", "Mosa, Abu S", "Osborne, John D", "Chong, Zechen"]}, {"abstract_id": "11", "source_row": 12, "pi": "", "title": "OPTIMATCH: A Multi-Agent Agentic AI Framework for PHI-Safe Oncology Clinical Trial Matching", "authors": "Aakash Desai, Sanad Alhushki, Ellen McNeeley, Mehmet Akce", "affiliations": "1 Department of Medicine, Heersink School of Medicine University of Alabama at Birmingham", "email": "sanadalhushki@uabmc.edu", "phone": "2057259932", "abstract": "Background: Clinical trial enrollment in oncology is constrained by the complexity of eligibility criteria and the effort required to manually screen patients against dozens of protocols. This process is time-intensive, inconsistent, and a known bottleneck for trial accrual. Large language models (LLMs) offer promising natural language reasoning capabilities for automating eligibility screening; however, their deployment in clinical settings requires robust protected health information (PHI) safeguards, interpretable decision support, and human oversight mechanisms. We developed OPTIMATCH, a multi-agent agentic AI system that automates the end-to-end oncology clinical trial eligibility screening pipeline while enforcing PHI safety and human-in-the-loop (HITL) control at each decision boundary.\nMethods: OPTIMATCH employs a sequential multi-agent orchestration architecture with a FastAPI backend and React/TypeScript frontend. The pipeline comprises seven specialized agents: (1) a document parsing agent using PyMuPDF with Tesseract OCR fallback for unstructured clinical documents; (2) a mandatory PHI safety agent using Microsoft Presidio NLP, which forms a hard boundary so no raw text reaches any LLM; (3) a patient extraction agent using Google Gemini 2.5 Flash to generate structured oncology profiles (histology, ECOG performance status, molecular markers, lines of prior therapy, CNS metastasis status) from redacted clinical notes; (4) a four-gate eligibility filter across all indexed protocols using Retrieval-Augmented Generation (RAG) with a Qdrant vector database storing 20+ trial protocol embeddings; (5) a full screening agent performing per-criterion eligibility evaluation with evidence-grounded verdicts (MET/NOT_MET/NEED_MORE_INFORMATION); (6) a documentation agent generating EMR-ready coordinator notes; and (7) a conversational agent supporting real-time protocol Q&A. Human-in-the-loop gates require coordinator confirmation before the pipeline advances past pre-screening and full screening stages.\nResults: The system processes unstructured oncology clinic notes and extracts structured patient profiles including genomic biomarker status with clinically relevant formatting. Pre-screening stratifies protocols across four eligibility gates in a single real-time inference call, with positive genomic findings visually prioritized for coordinator review. Full screening produces per-criterion reasoning with direct evidence citations from patient notes. End-to-end latency is compatible with clinical workflow integration, and no PHI is transmitted to LLM endpoints in any pipeline stage.\nConclusions: OPTIMATCH demonstrates a practical agentic AI architecture for oncology clinical trial matching addressing key barriers to LLM clinical deployment: PHI safety via mandatory pre-LLM redaction, interpretable criterion-level reasoning, and clinical oversight via HITL orchestration. Future work includes prospective validation against expert coordinator decisions, EHR integration, and expansion of the protocol library.", "keywords": "clinical trials, oncology, large language models, artificial intelligence", "reviewers": ["Osborne, John D", "Amy Wang", "Jinzhuang Dou", "Garmire, Lana", "Chen, Jake Y"]}, {"abstract_id": "12", "source_row": 13, "pi": "Rahul Sharma", "title": "Explainable AI for Precision Stratification of Vemurafenib Response in Melanoma", "authors": "Dipal Shah, Ph.D.,\nRahul Sharma, Ph.D.,\nAndrzej T. Slominsk, M.D., Ph.D.", "affiliations": "1. Department of Biomedical Informatics and Data Sceince, HSOM, The University of Alabama at Birmingham, AL. USA,", "email": "rsharma3@uab.edu", "phone": "2055669700", "abstract": "Structured Abstract\n\nBackground:\nResponse to Vemurafenib in melanoma is heterogeneous, and biologically interpretable markers of sensitivity and resistance are still needed to support translational stratification. Explainable artificial intelligence (XAI) offers a way to move beyond black-box prediction by linking drug-response estimates to gene- and pathway-level programs. We evaluated whether an XAI-guided in silico workflow could identify melanoma-relevant biological signals that distinguish predicted Vemurafenib-sensitive from predicted Vemurafenib-resistant skin cutaneous melanoma (SKCM) models.\n\nMethods:\nWe used an explainable drug-response platform built on a LightGBM model trained on GDSC2 pharmacogenomic data comprising 120,422 drug-cell line measurements across 801 cancer cell lines, 173 drugs, and 31 cancer types. The model incorporated 657 gene-expression features and drug-structure descriptors and achieved test performance of R2=0.8571 and RMSE=1.0708. For this melanoma-focused precision medicine use case, all 34 SKCM cell lines were screened against Vemurafenib and ranked by predicted LN_IC50. A cohort of 10 SKCM cell lines was then defined, including 5 predicted sensitive and 5 predicted resistant samples. SHAP-based feature attribution was used to prioritize gene-level drivers, followed by pathway enrichment and integrated evidence synthesis at both sample and cohort levels.\n\nResults:\nWithin the SKCM screen, cell line 907067 was among the most Vemurafenib-sensitive models and served as the focus sample for explanation. Across the 10-sample cohort, XAI identified recurrent melanoma-relevant pathway programs separating predicted sensitive and resistant groups. Supported pathway terms included MITF-dependent gene expression, regulation of MITF-dependent genes involved in cell cycle and proliferation, pigmentation, melanocyte development, and negative regulation of programmed cell death. At the integrated evidence level, MITF, BAX, and IKZF1 emerged as the most supported biomarker candidates, while MET and ETV5 were classified as suggestive follow-up markers. A supported preranked GSEA signal was also observed (NES = -1.80, nominal p = 0.00858, FDR = 0.0496). Together, these findings suggest that predicted Vemurafenib response in melanoma is associated not only with individual genes, but with coherent lineage- and survival-related biological programs.\n\nConclusions:\nThese findings support the use of explainable AI for precision stratification of melanoma targeted therapy response. Rather than providing prediction alone, the framework generated interpretable cohort-level biology linking Vemurafenib sensitivity to MITF-associated melanocytic programs and apoptosis-related signals. However, these results are hypothesis-generating, derived from cell-line-based in silico analysis, and require independent experimental validation in external cohorts and functional studies before clinical interpretation.", "keywords": "Melanoma, Vemurafenib, Explainable AI, SHAP, Precision Oncology, Biomarkers", "reviewers": ["Amy Wang", "Chong, Zechen", "Jinzhuang Dou", "Chen, Jin (Campus)", "Chen, Jake Y"]}, {"abstract_id": "13", "source_row": 14, "pi": "Rahul Sharma", "title": "Explainable AI for Precision Stratification of Vemurafenib Response in Melanoma", "authors": "Dipal Shah, Ph.D., \nRahul Sharma, Ph.D.,\nSlominski, Andrzej, M.D., Ph.D.", "affiliations": "Department of Biomedical Informatics and Data Science, HSOM, The University of Alabama at Birmingham, AL, USA", "email": "rsharma3@uab.edu", "phone": "2055669700", "abstract": "Background:\nResponse to Vemurafenib in melanoma is heterogeneous, and biologically interpretable markers of sensitivity and resistance are still needed to support translational stratification. Explainable artificial intelligence (XAI) offers a way to move beyond black-box prediction by linking drug-response estimates to gene- and pathway-level programs. We evaluated whether an XAI-guided in silico workflow could identify melanoma-relevant biological signals that distinguish predicted Vemurafenib-sensitive from predicted Vemurafenib-resistant skin cutaneous melanoma (SKCM) models.\n\nMethods:\nWe used an explainable drug-response platform built on a LightGBM model trained on GDSC2 pharmacogenomic data comprising 120,422 drug-cell line measurements across 801 cancer cell lines, 173 drugs, and 31 cancer types. The model incorporated 657 gene-expression features and drug-structure descriptors and achieved test performance of R2=0.8571 and RMSE=1.0708. For this melanoma-focused precision medicine use case, all 34 SKCM cell lines were screened against Vemurafenib and ranked by predicted LN_IC50. A cohort of 10 SKCM cell lines was then defined, including 5 predicted sensitive and 5 predicted resistant samples. SHAP-based feature attribution was used to prioritize gene-level drivers, followed by pathway enrichment and integrated evidence synthesis at both sample and cohort levels.\n\nResults:\nWithin the SKCM screen, cell line 907067 was among the most Vemurafenib-sensitive models and served as the focus sample for explanation. Across the 10-sample cohort, XAI identified recurrent melanoma-relevant pathway programs separating predicted sensitive and resistant groups. Supported pathway terms included MITF-dependent gene expression, regulation of MITF-dependent genes involved in cell cycle and proliferation, pigmentation, melanocyte development, and negative regulation of programmed cell death. At the integrated evidence level, MITF, BAX, and IKZF1 emerged as the most supported biomarker candidates, while MET and ETV5 were classified as suggestive follow-up markers. A supported preranked GSEA signal was also observed (NES = -1.80, nominal p = 0.00858, FDR = 0.0496). Together, these findings suggest that predicted Vemurafenib response in melanoma is associated not only with individual genes, but with coherent lineage- and survival-related biological programs.\n\nConclusions:\nThese findings support the use of explainable AI for precision stratification of melanoma targeted therapy response. Rather than providing prediction alone, the framework generated interpretable cohort-level biology linking Vemurafenib sensitivity to MITF-associated melanocytic programs and apoptosis-related signals. However, these results are hypothesis-generating, derived from cell-line-based in silico analysis, and require independent experimental validation in external cohorts and functional studies before clinical interpretation.", "keywords": "Melanoma, Vemurafenib, Explainable AI, SHAP, Precision Oncology, Biomarkers", "reviewers": ["Chen, Jake Y", "Garmire, Lana", "Mosa, Abu S", "Osborne, John D", "Jinzhuang Dou"]}, {"abstract_id": "14", "source_row": 15, "pi": "Jake", "title": "TabGraphSyn: Graph-Guided Latent Diffusion for High-Fidelity and Privacy-Conscious Clinical Data Generation", "authors": "Zongqian Wu, Haoyuan Cheng, Rahat Khan, Huiping Chen,Jake Y Chen", "affiliations": "1: Systems Pharmacology AI Research Center (SPARC), Department of Biomedical Informatics and Data Science, The University of Alabama at Birmingham, AL, USA. \n2: School of Computer Science, University of Birmingham, Edgbaston, Birmingham, UK", "email": "hcheng@uab.edu", "phone": "2124330852", "abstract": "The critical need for accessible patient data in clinical research is often hindered by privacy regulations and data scarcity. While synthetic data generation offers a promising solution, existing generative models face key limitations. GANs can suffer from training instability, while diffusion models typically process records independently and often neglect the local neighborhood structure of the data manifold. To address this gap, we introduce TabGraphSyn, a two-stage generative framework for synthesizing patient data. Our approach constructs a patient similarity graph (k-NN) to encode local neighborhood geometry and density in feature space. The resulting relational embeddings guide a latent diffusion model, ensuring the generative process preserves both single-record feature distributions and the intricate joint feature structure and local density structure of the original dataset. Evaluations on TCGA, AIDS and WBCD clinical datasets show TabGraphSyn outperforms tested baselines, achieving up to a 3.5% reduction in marginal distribution error and a 2.61% decrease in pairwise correlation error while maintaining 100% data validity. For downstream utility, classifiers trained on synthetic data matched real-data performance in a classification task, achieving an AUC of 99.38%. In a survival analysis, the synthetic data identified significant covariates with a high F1-score of 0.857. An ablation study confirms that leveraging similarity-based neighborhood embeddings via the GNN module is crucial for the observed improvements in fidelity and utility. Privacy audits of best DCR confirmed robust deidentification. Graph embeddings yielded up to 11% improvement in ten-fold augmentation, enabling large-cohort synthesis. By integrating similarity-based neighborhood structure into the generative process, TabGraphSyn offers a robust method for generating high-fidelity synthetic clinical data.", "keywords": "Synthetic data, diffusion models, graph neural networks, privacy-preserving, clinical data", "reviewers": ["Osborne, John D", "Garmire, Lana", "Amy Wang", "Chong, Zechen", "Mosa, Abu S"]}, {"abstract_id": "15", "source_row": 16, "pi": "Rahul Sharma", "title": "Agentic AI for EHR-Grounded Cohort Definition Refinement in Clinical Informatics", "authors": "Rahul Sharma, Ph.D.,\nMathew C Wyatt, MSHI,\nAbu S Mosa, PhD, MS, FAMIA,\nJames Cimino, MD, FACMI, FACP, FAMIA, FIAHSI", "affiliations": "Department of Biomedical Informatics and Data Science, HSOM, The University of Alabama at Birmingham, AL, USA.", "email": "rsharma3@uab.edu", "phone": "2055669700", "abstract": "Abstract Body\nBackground: Translating narrative eligibility criteria into computable EHR queries remains a major bottleneck in clinical research and precision medicine. Investigators often describe clinically meaningful populations using free text, but converting those descriptions into locally supported, terminology-aligned cohort logic requires repeated manual revision and feasibility checking. We developed CORA, an agentic AI system for cohort definition refinement in clinical informatics.\n\nMethods: CORA orchestrates specialized large language model agents for study inference, criteria expansion, cohort drafting, terminology mapping, EHR verification, and automated revision. The system is grounded in a local EHR population catalog and metadata spanning conditions, measurements, medications, procedures, devices, visits, notes, and demographics. A web-based interface streams intermediate reasoning and returns a revised cohort definition linked to standard clinical vocabularies and local data support.\n\nResults: In the deployed environment, the grounding catalog spans more than 1.5 million persons with condition data, more than 1.4 million with measurement data, more than 1.2 million with drug exposure data, and more than 2.0 million with visit data. In proof-of-concept use, CORA generated structured inclusion and exclusion logic from free-text study requests, mapped candidate concepts to standard terminologies including SNOMED CT, ICD-10-CM, LOINC, and RxNorm, identified unsupported or partially supported criteria, and revised overly specific requests toward locally computable alternatives. The workflow produced transparent, reviewable cohort drafts and reduced dependence on purely manual trial-and-error feasibility assessment.\n\nConclusions: Agentic AI can function as a clinical informatics copilot for cohort design by bridging investigator intent with local EHR reality. Rather than serving only as a text-generation tool, an EHR-grounded multi-agent workflow can improve the computability, transparency, and practical feasibility of cohort definitions for precision medicine research.", "keywords": "Agentic AI, Clinical Informatics, Cohort Discovery, EHR Phenotyping, Precision Medicine, LLMs", "reviewers": ["Garmire, Lana", "Chen, Jake Y", "Amy Wang", "Osborne, John D", "Jinzhuang Dou"]}, {"abstract_id": "16", "source_row": 17, "pi": "Ahmad, Aftab", "title": "Explainable AI Reveals BDNF-Associated ARDS Subphenotypes with Cluster-Specific Clinical Signatures", "authors": "Dipal Shah, Ph.D.,\nRahul Sharma, Ph.D.,\nSandeep Bodduluri, MS, PhD,\nAftab Ahmad PhD", "affiliations": "Department of Anesthesiology and Perioperative Medicine, HSOM, The University of Alabama at Birmingham, AL, USA.", "email": "shahdipal8@gmail.com", "phone": "6597589988", "abstract": "Background\nAcute Respiratory Distress Syndrome (ARDS) is heterogeneous, and the phenotypic relevance of the Brain-Derived Neurotrophic Factor (BDNF) biomarker may differ across patient subgroups. We used an explainable machine learning workflow to examine whether BDNF status corresponds to distinct clinical subphenotypes within embedding-derived ARDS clusters.\n\nMethods\nPatient data were modeled using PCA for dimensionality reduction, K-Means for clustering, and an auto-tuned multilayer perceptron (MLP) for predictive modeling. SHAP was used to identify the clinical features most strongly associated with each cluster and with BDNF-present versus BDNF-absent cases within each cluster. Cluster-level interpretations were derived from the experiment outputs and compared across BDNF strata.\n\nResults\nThe tuned model achieved 0.9255 accuracy, 0.9212 macro recall, 0.9214 macro F1, and 0.9212 balanced accuracy after preprocessing 267 samples. Four clusters were identified. Cluster 0 was interpreted as Cardiogenic Pulmonary Edema-Dominant ARDS Phenotype in BDNF-present cases and as Hypoxemia-Driven ARDS with Cardiovascular Instability in Elderly with Hypoalbuminemia in BDNF-absent cases, with the overall cluster also described as Elderly Vasopressor-Dependent ARDS with Severe Hypoxemia and Acid-Base Disturbance. Cluster 1 was labeled Vasoactive-Fluid Instability ARDS Phenotype in BDNF-present cases and Vasoactive-Dependent Hemodynamic-Fluid Overload ARDS Phenotype in BDNF-absent cases, with the overall cluster described as Vasoactive-Driven Hemodynamic Instability with Electrolyte and Acid-Base Dysregulation in ARDS. Cluster 2 was interpreted as Vascular-Leak Vasopressor-Dependent Hypoxemic ARDS Phenotype in BDNF-present cases and Vasopressor-Dependent Hemodynamic Instability with Hypoalbuminemia ARDS Phenotype in BDNF-absent cases, with the overall cluster described as Vasoactive-Dependent Hypotension with Hypoalbuminemia and Fluid Overload ARDS Phenotype. Cluster 3 was interpreted as Electrolyte-Acid-Base Dysregulation with Vasopressor-Dependent Severe Respiratory Failure in BDNF-present cases and Vasoactive-Dependent ARDS with Hemodynamic Instability and Electrolyte/Acid-Base Dysregulation in BDNF-absent cases, with the overall cluster described as Hemodynamic-Respiratory Instability ARDS Phenotype. Across clusters, BDNF-positive and BDNF-negative subsets showed different dominant feature patterns, especially in respiratory severity, vasopressor exposure, fluid balance, oxygenation, and acid-base variables. Evidence support was retrieved from PubMed; the experiment summary contains 34 citation records across the cluster-level evidence outputs, representing 8 unique PMIDs. If a more specific BDNF-defined subclass name was not present in the outputs, evidence was not found.\n\nConclusions\nExplainable AI can be used to uncover BDNF-associated ARDS subphenotypes and to distinguish phenotype-specific clinical drivers within the same cluster. The results suggest that BDNF status is linked to different physiological patterns across ARDS subgroups, supporting interpretable phenotype discovery rather than prediction alone.", "keywords": "ARDS, BDNF, Explainable AI, SHAP, Phenotyping, Machine Learning, Clinical Informatics, Subphenotypes, PCA", "reviewers": ["Jinzhuang Dou", "Amy Wang", "Chen, Jin (Campus)", "Osborne, John D", "Chen, Jake Y"]}, {"abstract_id": "17", "source_row": 18, "pi": "Jin", "title": "Do CRRT Machine Signals Add Prognostic Value? A Multimodal Machine Learning Approach to ICU Mortality Prediction", "authors": "Shehan I. Pranto 1, Joanna Yang 5, Stuart Goldstein 4,  Joshua Lambert 3, Lili Chan 5, Javier Neyra 2, Jin Chen 2", "affiliations": "1. Department of Biomedical Informatics and Data Science, University of Alabama at Birmingham\n2. Division of Nephrology, Department of Medicine, University of Alabama at Birmingham, \n3. Center for Clinical and Translation Science, University of Kentucky, \n4. University of Cincinnati College of Medicine, \n5. Division of Nephrology, Department of Medicine, Mount Sinai", "email": "prantos@uab.edu", "phone": "6592288267", "abstract": "Background: Acute kidney injury requiring renal replacement therapy complicates 5–15% of ICU admissions in the United States and carries in-hospital mortality exceeding 50%. These patients are commonly treated with continuous renal replacement therapy (CRRT), yet existing mortality prediction models ignore the continuous data generated by the CRRT machine itself. Every minute of therapy, CRRT circuits produce four pressure signals (access, filter, effluent, return) that reflect circuit integrity, vascular access, filter performance, and patient hemodynamics, one of the richest continuous physiologic data streams in critical care, yet almost entirely discarded after treatment. In this study, we evaluate whether adding CRRT pressure features to clinical data improves rolling day-wise mortality prediction over clinical data alone.\n\nMethods: We used the CRRTnet cohort (976 patients, 5,193 treatment-days) to predict ICU mortality over 1-day and 2-day rolling windows. We compared three data configurations (clinical-only, machine-only, and combined) under two feature strategies (per-day and aggregated), for a total of six pipelines at each prediction window. Per-day features captured each patient-day in isolation: 13 descriptive statistics for each of the four CRRT pressure streams (52 machine features), 23 laboratory values, and 112 demographic and comorbidity indicators. Aggregated features replaced same-day values with cumulative summaries across all prior CRRT days, using 4 statistics for laboratory values and 13 statistics for machine signals recomputed from cumulative minute-level readings; static characteristics were unchanged. We selected features using grouped mRMR (40 for clinical-only, 20 for machine-only, 20 + 40 for combined) and tuned eight classifiers with RandomizedSearchCV (30 iterations, 5-fold stratified cross-validation, AUROC-optimized). The validation set was used only for F1-based threshold selection, and the held-out test set only for final evaluation, with no patient overlap across splits. SHAP analysis quantified feature contributions in combined models.\n\nResults: Clinical features were the primary predictive drivers (AUROC 0.73–0.78 vs. 0.64–0.69 for machine-only). Adding CRRT pressure features improved discrimination, with the best performance achieved by the aggregated combined 1-day model (Gradient Boosting; AUROC 0.801, F1 0.759, AUPRC 0.783, Recall 0.981), exceeding clinical-only performance (+0.025 AUROC, +0.041 F1). The largest gains were observed in the combined 1-day setting with aggregation (+4.8 AUROC, +6.3 F1 over per-day features). SHAP analysis showed that pressure features contributed disproportionately (33–53% of top predictors), with filter and return pressures consistently among the most informative.\n\nConclusion: Clinical variables remain the strongest individual predictors of ICU mortality, but incorporating CRRT pressure signals improves discrimination and delivers the best overall performance.", "keywords": "Continuous renal replacement therapy; Mortality prediction; Machine learning; Acute Kidney Injury.", "reviewers": ["Chong, Zechen", "Amy Wang", "Osborne, John D", "Mosa, Abu S", "Jinzhuang Dou"]}, {"abstract_id": "18", "source_row": 19, "pi": "Jin", "title": "Region-Adaptive Conditional MeanFlow for CT Image Enhancement", "authors": "1. Md Shifatul Ahsan Apurba*; 2. Md Selim, PhD; 3. Jin Chen, PhD;", "affiliations": "1. Department of Biomedical Informatics and Data Science, School of Medicine, University of Alabama at Birmingham, Birmingham, AL, USA.\n2. Department of Computer Science, Florida Polytechnic University, Lakeland, FL, USA.\n3. Department of Biomedical Informatics and Data Science, School of Medicine, University of Alabama at Birmingham, Birmingham, AL, USA.", "email": "mapurba@uab.edu", "phone": "2053650219", "abstract": "Background: While low-dose CT screening has been shown to reduce lung cancer mortality, its effectiveness is constrained by subtle, low-contrast abnormalities and scanner-induced variability, both of which degrade image quality and compromise radiomic reliability. Most existing enhancement techniques rely on global transformations and often fail to retain the fine structural and textural details that are essential for early-stage detection.\n\nMethods: In this work, we introduce a Region-Adaptive Conditional MeanFlow (RA-CMF) framework for CT image enhancement. The proposed approach integrates a conditional MeanFlow backbone for global enhancement with a region-adaptive refinement module designed for spatially selective improvement.\n\nThe MeanFlow backbone formulates enhancement as a continuous transformation from degraded CT inputs to a standardized image domain. Rather than learning direct mapping, it models the transformation dynamics along a trajectory from noise to the target image, conditioned on the input CT to preserve anatomical fidelity. This backbone is implemented using a conditioned U-Net and trained on paired CT data with objectives that enforce transformation consistency, maintain image fidelity, and preserve gradients to avoid over-smoothing. To address spatially heterogeneous degradation, the region-adaptive module operates on intermediate enhancement states. It evaluates residual errors and flow magnitudes to identify regions requiring additional refinement. A reinforcement learning–based controller then predicts spatially varying refinement actions, which are translated into continuous gating maps that guide the enhancement updates. This mechanism enables focused improvement in challenging regions while maintaining stability in already well-enhanced areas. The controller is optimized using a reward function that balances local enhancement, global consistency, and minimal intervention.\n\nThe model is trained on 15,000 LDCT scans from the NLST dataset, with 3,000 cases used for validation and 1,500 for testing. Performance is assessed through paired comparisons with reference images, using standard image fidelity metrics and radiomics features.\n\nResults: Our baseline conditional MeanFlow achieved a PSNR of 32.09 and an SSIM of 0.898. The proposed RA-CMF framework further improved image quality, reaching a PSNR of 34.06 and an SSIM of 0.947. Radiomic reproducibility showed consistent gains across feature families, with concordance correlation coefficients increasing for GLCM (0.98 vs. 0.90), GLDM (0.86 vs. 0.59), GLRLM (0.81 vs. 0.39), GLSZM (0.91 vs. 0.74).\n\nConclusions: RA-CMF provides an effective approach for CT image enhancement, improving both image fidelity and radiomic stability through spatially adaptive refinement. The method preserves clinically relevant features and supports more reliable downstream analysis for early lung cancer detection and multimodal modeling.", "keywords": "CT image enhancement, low-dose CT, conditional MeanFlow, radiomic reproducibility, region-adaptive refinement", "reviewers": ["Amy Wang", "Mosa, Abu S", "Osborne, John D", "Chong, Zechen", "Chen, Jake Y"]}, {"abstract_id": "19", "source_row": 20, "pi": "Lana?", "title": "Integrating Machine Learning with Microbiome–Tumor Metabolic Modeling to Predict Synergistic Therapies", "authors": "*Annie J Badenoch*1, Zeyang Pang2, Carolina H. Chung2, Aaron Robida3, Bretton Badenoch4, Ritish Natesan5, Layth Kakish2, Jiahe Li2,5,6, and Sriram Chandrasekaran1,2,7", "affiliations": "1.\tGilbert S. Omenn Department of Computational Medicine and Bioinformatics, University of Michigan, Ann Arbor, MI, USA \n2.\tDepartment of Biomedical Engineering, University of Michigan, Ann Arbor, MI 48109, USA\n3.\tCenter for Chemical Genomics, University of Michigan, Ann Arbor, MI 48109, USA\n4.\tDepartment of Molecular and Cellular Pathology, University of Michigan, Ann Arbor, MI, 48103, USA  \n5.\tDepartment of Computer Science and Engineering, University of Michigan, Ann Arbor, MI, 48109, USA\n6.\tCollege of Engineering and School of Medicine, University of Michigan, Ann Arbor, MI 48109, USA\n7.\tInstitute for Data and AI in Society, University of Michigan, Ann Arbor, MI 48109, USA", "email": "anniejs@umich.edu", "phone": "2184341614", "abstract": "Differences in microbiome composition can substantially alter cancer drug response, yet computational approaches to model metabolic interactions between tumors, microbes, and therapeutics remain limited. In colorectal cancer (CRC), pathogens such as Fusobacterium nucleatum (Fn) have been implicated in therapy resistance, underscoring the need for microbiome-aware predictive frameworks.  We present a microbiome-aware computational framework combining machine-learning and genome-scale metabolic models (GEMs) to predict combination therapies for colorectal cancer (CRC) in the presence of Fn and other pathogenic, probiotic, and commensal microbes. Human cell GEMs were constrained using bulk RNA-sequencing data to simulate the metabolic flux through reactions in cells under different treatments or co-culture conditions. An ensemble random forest model was trained using this flux data and 6,514 known drug synergy scores. The model learns predictive metabolic flux signatures from treatment-specific profiles, enabling the identification of synergistic drug combinations across both microbe-free and microbe-associated contexts and generalized to immunotherapy settings such as PD-1 blockade. Model performance was supported through prospective comparison with newly reported drug combinations, in vitro drug synergy assays, microbiome co-culture experiments, and targeted metabolic perturbations of predicted pathway dependencies. On held-out datasets, the model achieved strong predictive performance, with Pearson correlation coefficients (R) ranging from 0.51 to 0.79 and 10-fold cross-validation AUC values between 0.79. For co-culture experiments, we utilized a transwell system that allows for culturing of anaerobic and aerobic cells in the same environment. This setup better replicates the colon microenvironment compared to traditional co-culture methods. Our validation experiments supported the model's prediction that Fn and the chemotherapy drug fluorouracil are synergistic. This is a novel and unintuitive finding because Fn is commonly associated with worse treatment outcomes. We targeted top feature pathways predicted by our model, which revealed phospho-inositol metabolism and cysteine transport as key determinants of Fn-dependent drug synergy. Additionally, the model can predict unique drug synergies with multiple symbiotic and pathogenic microbes, including E. coli and S. gallolyticus, as well as combinations of microbial species. Together, this work introduces a scalable strategy for discovering microbiome-dependent combination therapies.", "keywords": "colon cancer; metabolism; machine learning; drug combinations", "reviewers": ["Chong, Zechen", "Mosa, Abu S", "Chen, Jin (Campus)", "Chen, Jake Y", "Osborne, John D"]}, {"abstract_id": "20", "source_row": 21, "pi": "Jake", "title": "Disease-to-Target: An AI-Assisted Platform for Conversational Drug Target Prioritization", "authors": "Nikhil Kurmachalam, Ehsan Saghapour, Jake Y. Chen", "affiliations": "Systems Pharmacology AI Research Center (SPARC), DBIDS, UAB School of Medicine", "email": "nkurmach@uab.edu", "phone": "2059098063", "abstract": "Problem / Motivation\nTarget identification is one of the earliest and most consequential bottlenecks in drug discovery. Researchers must simultaneously synthesize genetic association data, clinical trial registries, and thousands of biomedical publications to determine which genes are worth pursuing therapeutically. This process is fragmented, manually intensive, and largely inaccessible to scientists without bioinformatics expertise ‚Äî resulting in slow, inconsistent prioritization and high downstream attrition rates.\nApproach / Methods\nWe present Disease to Target, an AI-assisted platform that transforms disease-to-target prioritization into an interactive, evidence-driven workflow. Given a disease input, the system generates a Target Prioritization List (GET list) ‚Äî a dynamically ranked gene table scored across six evidence dimensions from Open Targets: genetic association, literature support, clinical evidence, expression relevance, novelty, and target tractability. Each candidate is enriched in real time by cross-referencing ClinicalTrials.gov for trial count, maximum phase, and active trial status, and Europe PMC for publication count and research velocity.\nThe platform's core technical contribution is a Model Context Protocol (MCP)-based tool layer backing the conversational interface. All user interactions ‚Äî filtering by clinical score, removing low-evidence targets, or narrowing to high-novelty candidates ‚Äî are executed as discrete, structured tool calls, making prioritization transparent, reproducible, and auditable without requiring code or database switching.\nKey Results\nApplied to breast cancer as a proof of concept, the platform surfaces clinically relevant targets including PIK3CA (0.88), CHEK2 (0.87), TP53 (0.86), ESR1 (0.85), and ERBB2 (0.83). For PIK3CA alone, the system identifies 164 registered clinical trials reaching Phase 4 and 21,368 publications ‚Äî consolidating evidence that would otherwise require manual lookup across multiple resources. The GET list also serves as structured input for downstream analyses, including 3D gene terrain visualization and survival-based expression mapping.\nSignificance & Novelty\nUnlike querying Open Targets or clinical databases directly, Disease to Target integrates heterogeneous evidence streams into a unified, interactively refinable prioritization workflow. Its novelty lies in combining structured multi-source evidence scoring with a conversational, tool-backed interface ‚Äî where user intent translates into reproducible filtering operations rather than one-off queries. This positions the platform as a practical implementation of AI-native knowledge infrastructure for drug discovery, enabling researchers to actively curate evidence and support more consistent, traceable decision-making throughout the lead optimization pipeline.", "keywords": "Target Identification, Drug Discovery, Open Targets, Model Context Protocol (MCP), Gene Prioritization AI-Native Knowledge Infrastructure", "reviewers": ["Chen, Jin (Campus)", "Garmire, Lana", "Mosa, Abu S", "Osborne, John D", "Amy Wang"]}, {"abstract_id": "21", "source_row": 22, "pi": "Jake", "title": "Structured Proxy Features for Multimodal NSCLC Survival Prediction from Pretreatment CT", "authors": "Huu Phong Nguyen1, Delower Hossain2, Ehsan Saghapour3, Zhandos Sembay3, Jake Y. Chen1,2,3*", "affiliations": "1: Department of Biomedical Informatics and Data Science, School of Medicine, The University of Alabama at Birmingham (UAB), Birmingham, AL, United States.\n2: Department of Computer Science, The University of Alabama at Birmingham (UAB), Birmingham, AL, United States.\n3: System Pharmacology and AI Research Center (SPARC), The University of Alabama at Birmingham (UAB), Birmingham, AL, United States.\n*Corresponding Author", "email": "hnguye24@uab.edu", "phone": "2145665216", "abstract": "Lung cancer results in roughly 1.8 million fatalities annually worldwide, with Non-small cell lung cancer (NSCLC) comprising the majority of cases. Despite advancements in treatment, survival stratification remains challenging due to intratumoral heterogeneity inadequately captured by conventional descriptors. Standard radiomic and deep learning techniques regard imaging features as independent quantities, overlooking structured interactions between tumor characteristics. We evaluate whether structured proxy features can enhance multimodal NSCLC survival prediction by augmenting pretreatment (Computed Tomography) CT representations, radiomics, and clinical variables with six simulation-derived features designed to capture interactions between heterogeneity and morphology. A radiomics-parameterized cellular automaton turns entropy and sphericity into low-dimensional proxy parameters, which then create growth rate and necrosis ratio as structured features. The imaging backbone is a Transformer-based Masked Autoencoder (TMAE), which was chosen after a systematic evaluation with alternative encoders within the same pipeline and provides spatially explainable attention maps that identify tumor regions most informative for prognosis. On the public Lung1 cohort (n = 390), the primary four-modality fusion attained a C-index of 0.641 (iAUC 0.731, log-rank p < 0.001). In a distinct coefficient-optimization study, the best configuration achieved a C-index of 0.662 (iAUC 0.748). Both exceed prior multimodal results on Lung1 (C-index 0.631; iAUC 0.592 [15]) utilizing comparable evaluation protocols. These findings indicate that proxy features may offer complementary prognostic insights beyond standard radiomic, deep, and clinical representations within this benchmark framework; however, their robustness across various splits and external cohorts has yet to be confirmed. The current findings support retrospective feasibility for prognostic ranking derived from routinely acquired pretreatment imaging.", "keywords": "non-small cell lung cancer; survival analysis; transformer-based masked autoencoder; cellular automata; radiomics-parameterized simulation; multimodal fusion.", "reviewers": ["Osborne, John D", "Chen, Jin (Campus)", "Garmire, Lana", "Chong, Zechen", "Jinzhuang Dou"]}, {"abstract_id": "22", "source_row": 23, "pi": "Chen Huang", "title": "IsoPepTracker: An Interactive Web Application for Peptide-Driven Isoform Analysis", "authors": "Araf Mahmud1 and Chen Huang1,2", "affiliations": "1: Department of Genetics, University of Alabama at Birmingham, Birmingham, AL 35233, USA\n2: O‚ÄôNeal Comprehensive Cancer Center, University of Alabama at Birmingham, Birmingham, AL 35233, USA", "email": "mahmuda@uab.edu", "phone": "2053810073", "abstract": "Alternative splicing affects 95% of multi-exon genes, generating protein isoforms with distinct functions. While current alternative splicing analyses effectively identify splice events at the RNA level, they provide limited protein-level insight. To address this gap, we developed IsoPepTracker (https://www.isopeptracker.org), a user-friendly web application for analyzing and visualizing differential peptides across canonical and novel isoforms that are theoretically detectable by shotgun mass spectrometry-based proteomics. IsoPepTracker features four modules: Canonical Isoform Analysis, Novel Isoform Discovery, Peptide Sequence Search, and Alternative Splicing Analysis. Each module is tailored for distinct and complementary proteogenomics analyses. Users can input genes, novel cDNA sequences, peptides, or alternative splicing results to pinpoint peptides of interest and identify their associations with target genes or isoforms. We demonstrate the straightforward application of IsoPepTracker in proteogenomics through case studies. We envision that IsoPepTracker will facilitate the translation of splice variants at the RNA level into proteomic discoveries.", "keywords": "Alternative splicing, Isoforms, Proteogenomics, Web-portal, Shotgun proteomics", "reviewers": ["Mosa, Abu S", "Chong, Zechen", "Chen, Jake Y", "Amy Wang", "Garmire, Lana"]}, {"abstract_id": "23", "source_row": 24, "pi": "Jake", "title": "SPARC: Building an AI-Enabled Knowledge Infrastructure for Open-Science Drug Discovery", "authors": "Zhandos Sembay 1, Swathi Thaker1 , Ehsan Saghapour 1, Sixue Zhang 1 and Jake Y. Chen 1,2", "affiliations": "1 Systems Pharmacology AI Research Center, School of Medicine, University of Alabama at Birmingham, AL 35205, USA\n2 Department Of Biomedical Informatics & Data Science, School of Medicine, University of Alabama at Birmingham, AL 35205, USA", "email": "zsembay8@uab.edu", "phone": "2055318211", "abstract": "Drug discovery remains slow, expensive, and fragmented, often progressing through a linear pipeline that separates molecular discovery, biological validation, clinical translation, and real-world evaluation. SPARC (Systems Pharmacology AI Research Center) was established to address this gap by advancing a more personalized, accelerated, and economically accessible model of therapeutic development through artificial intelligence, systems pharmacology, and digital-twin thinking. SPARC‚Äôs mission is to make drug discovery ‚ÄúPEACE‚Äù: personalized, accelerated, and economically accessible for all.\n\nOur approach is to build an integrated AI operating model for open-science drug discovery. At the workflow level, SPARC uses layered AI: everyday AI for routine scientific tasks, process-improvement AI for data curation and reproducible pipelines, and ‚Äúbig-ideas AI‚Äù for ambitious platforms such as digital twins, agentic science, and open-source drug discovery.¬†  Methodologically, this vision is paired with an ‚ÄúAI Drug Discovery 2.0‚Äù framework that treats discovery as a multi-scale, parallel, evidence-driven process rather than a strictly sequential one. In this framework, evidence is generated concurrently across scales ranging from gene and pathway networks to cells, tissues, organs, patients, cohorts, and populations, and is integrated through complementary streams such as Terrain2Drug, Market2Drug, and Paper2Drug.¬†  SPARC further emphasizes FAIR data and software practices, open science, auditability, and human-in-the-loop AI agents that support planning, learning, execution, assessment, and sharing across research teams.\n\nEarly outcomes from this strategy include SPARC-supported knowledge and application assets such as the CM4AI.org web and data portal, the Talent Knowledge Graph, smartdrugdiscovery.org, GeneTerrain applications, and AI-enabled modeling efforts spanning target discovery, QSAR, and de novo design. These efforts demonstrate the center‚Äôs transition from isolated AI tools toward a connected knowledge infrastructure for collaborative biomedical research.¬†  Expected outcomes include faster hypothesis generation, improved evidence integration across biological scales, better reproducibility, stronger milestone tracking, and more effective translation from open data to therapeutic insight.\n\nThe significance of this work is that it reframes an AI research center not simply as a model-development group, but as a knowledge infrastructure for modern biomedical discovery. SPARC‚Äôs novelty lies in combining open-science principles, agentic AI workflows, digital biology/chemistry/medicine, and multi-scale evidence generation into a unified operating system for drug discovery. In that sense, SPARC directly aligns with the event themes of **AI operating systems** and **knowledge infrastructure** by showing how AI can coordinate people, data, tools, and scientific reasoning into a more transparen
