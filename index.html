t and scalable discovery ecosystem.", "keywords": "ai drug discovery", "reviewers": ["Osborne, John D", "Chong, Zechen", "Garmire, Lana", "Amy Wang", "Mosa, Abu S"]}, {"abstract_id": "24", "source_row": 25, "pi": "Jake", "title": "Genome-Wide Off-Target Toxicity Profiling with Contrastive Learning", "authors": "Fuad Al Abir, Delower Hossain, Sixue Zhang, Jake Chen", "affiliations": "1: Department of Biomedical Informatics and Data Science, Heersink School of Medicine, University of Alabama at Birmingham, AL, USA, 2: Department of Computer Science, College of Arts and Sciences, University of Alabama at Birmingham, AL, USA, 3: Systems Pharmacology AI Research Center, , Heersink School of Medicine, University of Alabama at Birmingham, AL, USA, 4: Department of Biomedical Informatics and Data Science, Heersink School of Medicine, University of Alabama at Birmingham, AL, USA.", "email": "fuad021@uab.edu", "phone": "205 586 7882", "abstract": "Background: Unanticipated off-target interactions are a primary driver of adverse drug reactions and late-stage clinical trial attrition. While structure-based virtual screening is heavily utilized for primary target discovery, its immense computational cost precludes exhaustive proteome-wide safety profiling. DrugCLIP, a recently developed contrastive learning framework, reformulates protein-ligand binding as a highly efficient dense retrieval task by mapping 3D protein pockets and molecular graphs into a unified latent space. This study investigates the application of DrugCLIP for ultra-large-scale, zero-shot computational prediction of off-target toxicity.\n\nMethods: We deployed a DrugCLIP model, pre-trained on PDBBind, to perform dense retrieval screening. Our dataset comprised 1.5 million ChEMBL compounds (including FDA-approved therapeutics and 342 historically withdrawn drugs) computationally screened against 44 established high-risk pharmacological anti-targets (the Bowes panel, e.g., hERG, 5-HT2A, and COX1/2). Vector embeddings were generated and queried using FAISS. Predictive performance was quantified using Area Under the Receiver Operating Characteristic (ROC-AUC) and Enrichment Factor at 1% (EF1%), benchmarked against AutoDock Vina and DeepDTA.\n\nResults: DrugCLIP demonstrated state-of-the-art zero-shot retrieval performance for in silico toxicity profiling. Across the 44 safety anti-targets, the model achieved an average ROC-AUC of 0.885 and an EF1% of 32.4, significantly outperforming traditional structure-based AutoDock Vina (ROC-AUC 0.712) and sequence-based DeepDTA (ROC-AUC 0.801). The contrastive dense retrieval approach accelerated screening by orders of magnitude, processing 66 million protein-ligand pairs in 42 minutes on a single Nvidia A100 GPU‚Äîa workload requiring >3,500 CPU-hours via molecular docking. In a retrospective computational analysis of the 342 clinically withdrawn drugs, DrugCLIP successfully identified the exact primary off-target mechanism responsible for toxicity in 81.3% (278/342) of cases within the top-10 retrieved pockets.\n\nConclusions: By reframing off-target toxicity prediction as a highly scalable dense retrieval problem, DrugCLIP achieves superior predictive accuracy while completely bypassing the computational bottlenecks of traditional docking. The capacity to preemptively screen millions of compounds against established safety panels in under an hour provides a rigorously validated, highly quantitative computational safeguard to derisk pharmaceutical pipelines. Future work will focus on the in vitro biological evaluation and in vivo experimental validation of the novel, uncharacterized high-affinity liability hits generated by this in silico pipeline to confirm their real-world toxicological impact.", "keywords": "DrugCLIP; Off-Target Toxicity; Dense Retrieval; Computational Toxicology; High-Throughput Virtual Screening; Contrastive Learning", "reviewers": ["Chong, Zechen", "Mosa, Abu S", "Amy Wang", "Jinzhuang Dou", "Garmire, Lana"]}, {"abstract_id": "25", "source_row": 26, "pi": "Zechen", "title": "Single-nucleus RNA-seq revealed mechanisms associated with post-hemorrhagic hydrocephalus", "authors": "Yuwei Song", "affiliations": "Department of Biomedical Informatics and Data Science, The University of Alabama at Birmingham, Birmingham, AL, USA.", "email": "zchong@uabmc.edu", "phone": "", "abstract": "Hydrocephalus is characterized by abnormal accumulation of cerebrospinal fluid (CSF), which leads to increased intracranial pressure that can affect neurodevelopment and cause morbidity. Intraventricular hemorrhage (IVH) is a common consequence of prematurity, and its occurrence increases as the baby is more premature. Post-hemorrhagic hydrocephalus (PHH) is a severe complication in premature infants following IVH. Endoscopic third ventriculostomy (ETV) offers a viable treatment for PHH by avoiding foreign-body implantation. While current PHH therapies focus on mechanical interventions, they overlook underlying molecular and cellular mechanisms specific to PHH. Therefore, attaining a deeper understanding of PHH pathophysiology is essential. In our study, we performed two single-nuclei RNA-seq on two ETV ‘core’ samples from patients with PHH. We integrated them with age-matched controls from Herring et al. and 11 distinct clusters were identified. Comparing cell-type abundance between HC and control groups revealed significant shifts. In particular, ODCs are significantly more abundant in HC samples, while astrocytes and neuron-related cell types are significantly less abundant. ODCs, which produce the myelin sheath that insulates axons, are crucial yet vulnerable due to their complex development. We observed upregulation of Th1 and Th2 cell differentiation in oligodendrocytes through gene set enrichment analysis. The immune balance shift (e.g., Th2 dominance) observed in the CSF of PHH patients suggests that immunological modulation may play a role. Our CellChat2 analysis reveals increased oligodendrocyte communication networks in hydrocephalus, featuring amplified ligand-receptor interactions with glial cells and neurons. This adaptive signaling response likely drives both detrimental neuroinflammation and compensatory remyelination efforts. Our single-nuclei RNA-seq analysis of PHH samples reveals significant cell-type-specific transcriptional changes and increased cell-cell communication in PHH. Our comprehensive study provides new insights into PHH, setting the stage for potential therapeutic targets.", "keywords": "", "reviewers": ["Garmire, Lana", "Chen, Jin (Campus)", "Osborne, John D", "Mosa, Abu S", "Chen, Jake Y"]}, {"abstract_id": "26", "source_row": 27, "pi": "Zechen", "title": "Comprehensive characterization of V(D)J recombination from long-read transcriptomic data with VDJcraft", "authors": "Kaili Hu, Alexander Rosenberg, Yuwei Song, Chia-Hsuan Fan, Zishan Peng, Min Gao, Zechen Chong", "affiliations": "Department of Biomedical Informatics and Data Science, The University of Alabama at Birmingham, Birmingham, AL, USA.", "email": "zchong@uabmc.edu", "phone": "", "abstract": "V(D)J recombination generates antigen receptor diversity in developing B and T cells. Long-read transcriptome technologies (e.g., PacBio Iso-Seq, Nanopore RNA/cDNA) capture full-length transcripts and thus resolve V(D)J events more accurately than short-read platforms. However, existing short-read tools are not applicable to or optimized for long-read data. We developed VDJcraft, the first integrated pipeline designed for V(D)J recombination analysis using long-read transcriptome sequencing data. The workflow uses a two-pass alignment strategy: global alignment to the GENCODE reference with minimap2, followed by local realignment and annotation using the international ImMunoGeneTics information system (IMGT). A customized module enhances D-gene detection sensitivity and positional precision. Sequencing errors are reduced through consensus-based correction toward the predominant subclass. Antigen-binding regions are annotated using IMGT-defined motifs to characterize CDRs and binding site composition. VDJcraft was validated on simulated and Human Genome Structural Variation Consortium (HGSVC) datasets and applied to disease datasets. It accurately recovered full-length V(D)J-C sequences and outperformed existing methods in gene detection and recombination accuracy. Long-read calls also showed significantly higher concordance with high-confidence short-read calls (Mann-Whitney U test, p = 1.55 × 10⁻4). Additionally, we identified 31 putative novel gene subclasses absent from the IMGT database from HGSVC datasets. Analyses of longitudinal blood samples from a COVID-19 patient revealed distinct V(D)J recombination patterns and segment enrichment, characterized by increased IGHV1-2 usage, enrichment of the IGHV3-7/IGHD6-9/IGHJ5_02 rearranged clonotype, and a transient peak in IgG2 levels at day 4 followed by a gradual return to baseline. In conclusion, VDJcraft provides a robust framework for long-read V(D)J characterization and enables the discovery of disease-associated immune signatures.", "keywords": "", "reviewers": ["Garmire, Lana", "Osborne, John D", "Chen, Jake Y", "Mosa, Abu S", "Jinzhuang Dou"]}, {"abstract_id": "27", "source_row": 28, "pi": "Zechen", "title": "Comprehensive characterization and analysis of nuclear mitochondrial DNA segments (NUMTs) from long-read sequencing data", "authors": "Chia Hsuan Fan", "affiliations": "Department of Biomedical Informatics and Data Science, The University of Alabama at Birmingham, Birmingham, AL, USA.", "email": "zchong@uabmc.edu", "phone": "", "abstract": "Nuclear mitochondrial DNA segments (NUMTs) arise from the insertion of mitochondrial DNA (mtDNA) into the nuclear genome, often during the repair of double-strand breaks. These insertions are frequently undetected by short-read sequencing due to their repetitive, chimeric nature but represent important contributors to genomic evolution, polymorphism, and structural variation. To address this gap, we developed fnumt, a computational tool optimized for detecting NUMTs from long-read sequencing data generated by PacBio HiFi and Oxford Nanopore Technologies (ONT).\nfnumt identifies NUMTs ranging from single-base insertions to full-length mtDNA (~16.5 kb). It takes aligned BAM or CRAM files as input and outputs standard VCF files, reporting chromosomal coordinates, insertion length, supporting read count, mismatch rate, mapping quality, variant allele frequency, and a quality score for confidence estimation.\nWe applied fnumt to 1,618 human genomes sequenced with long-read technologies, identifying 34,275 NUMT events across 783 unique loci—557 of which were previously unreported. Individuals carried an average of 21 NUMTs, including 15 inferred de novo insertions. Notably, 8.5% of detected NUMTs exceeded 1,000 base pairs. NUMTs were significantly enriched near repetitive elements, especially LINEs (23.07%) and SINEs (13.36%). Chromosome 1 harbored the most unique NUMT loci.\nFlanking sequences exhibited non-random trinucleotide motifs, and evolutionary analysis revealed both recent and ancient insertion events, some persisting for millions of years. Functional enrichment linked NUMTs to biological processes including nervous system development, immune regulation, and skeletal morphogenesis. KEGG and GO analyses implicated enrichment of RNA-mediated regulatory processes suggests that genes near NUMT insertion sites may be under tight transcriptional and post-transcriptional control, potentially to maintain genome stability.Moreover, cis-eQTL mapping suggested  NUMTs related gene on chr14 might be associated with antigen binding sites variation of immune response. In some previous studies, IGHV6-1 and IGHV3 family are considered to be found in or near the CDRs , which are more likely to acquire the glycosylation status of anti-bodies. And the N-glycosylation is usually related to increase antigen specificity.\nIn summary, fnumt provides a robust, scalable solution for NUMT discovery using long-read sequencing. By accurately characterizing NUMTs across a broad size spectrum and diverse genomic contexts, it enables high-resolution investigations into their evolutionary dynamics, regulatory potential, and roles in human traits, aging, immune function, and mitochondrial disease.", "keywords": "", "reviewers": ["Amy Wang", "Jinzhuang Dou", "Osborne, John D", "Mosa, Abu S", "Chen, Jake Y"]}, {"abstract_id": "28", "source_row": 29, "pi": "John", "title": "Synthetic data improves Human Phenotype Ontology Term Recognition", "authors": "Vijay Jain, Matt Might,John Osborne", "affiliations": "Department of Biomedical Informatics and Data Science, The University of Alabama at Birmingham, Birmingham, AL, USA.", "email": "ozborn@uab.edu", "phone": "", "abstract": "Recognition of Human Phenotype Ontology (HPO) terms in clinical text is constrained by limited annotated data, with the GSC+ corpus comprising only a few hundred documents and HPO concepts providing sparse coverage. This scarcity hampers supervised named entity recognition (NER) and concept normalization. We evaluate whether large language model (LLM)–generated synthetic clinical notes, annotated with HPO entities, can effectively augment GSC+ and improve downstream NER performance.We fine-tuned a Clinical ModernBERT model for token-level HPO recognition under three training regimes: real-only (GSC+), synthetic-only, and mixed (real + synthetic). To construct the synthetic corpus, we prompted Claude to generate ~100 annotated clinical notes per HPO term, spanning diverse document types (e.g., clinical notes, case reports, discharge summaries). Prompts incorporated each term’s HPO identifier, synonyms, and definition, with inline entity markup. Generated notes were subsequently refined through a two-stage LLM review pipeline that corrected tags and added missed entities using semantically retrieved candidates from the full HPO ontology (~19,000 terms). This process yielded a substantially expanded dataset (~61,500 training chunks vs. 183 in GSC+). Models were trained at two effective epoch budgets (16 and 32) and evaluated on a held-out GSC+ test set.Mixed training consistently outperformed real-only baselines. The best mixed condition achieved an F1 score of 0.768, exceeding the strongest real-only model (0.716) by +5.2 points and the lower-epoch baseline by +21.7 points. Improvements were driven primarily by recall gains (e.g., 0.514 → 0.724 at 16 epochs), indicating that synthetic augmentation broadens exposure to diverse HPO term realizations. In contrast, synthetic-only training achieved high precision (~0.79) but substantially lower recall (~0.36–0.40). Additionally, additional performance improvement continued on real data up to 32 epochs, while synthetic data performance peaked after only 16 epochs.These findings demonstrate that LLM-generated synthetic data serves as an effective complement to limited gold-standard annotations, particularly by enhancing recall through expanded term diversity. However, synthetic data alone is insufficient to replace curated corpora. Hybrid training strategies leveraging both real and synthetic data offer a practical path to improving phenotype extraction, particularly in low-resource settings.", "keywords": "", "reviewers": ["Mosa, Abu S", "Chong, Zechen", "Garmire, Lana", "Chen, Jake Y", "Chen, Jin (Campus)"]}, {"abstract_id": "29", "source_row": 30, "pi": "Jinzhuang", "title": "Monopogen 2.0: Functional Interpretation of Genetic Variation at Cellular Resolution Using Single-Cell Genomics", "authors": "Xin Liang, Jinzhuang Dou", "affiliations": "Department of Biomedical Informatics and Data Science, The University of Alabama at Birmingham, Birmingham, AL, USA.", "email": "jdou@uab.edu", "phone": "", "abstract": "Genetic variation shapes human disease by influencing cellular phenotypes. Genome-wide association studies (GWAS) have identified thousands of disease-associated variants, yet their cellular mechanisms remain largely unresolved, particularly at single-cell resolution and across diverse ancestries. Similarly, somatic mutations drive cellular heterogeneity and disease progression, but current computational frameworks lack the ability to robustly link these mutations to functional cellular outcomes. \nWe have developed Monopogen, a method for detecting single nucleotide variants (SNVs) from single-cell sequencing (SCS) data (Nature Biotechnology, 2024). In this talk, we extend this framework to construct the first large-scale cell–genetic map using over 1,000 single-cell breast cancer samples, enabling systematic characterization of how genetic ancestry shapes cellular phenotypes in human tumor atlases within the Human Tumor Atlas Network (HTAN). Second, we develop a strategy for somatic mutation detection that leverages linkage between somatic mutations and nearby germline SNVs, either through read-level physical linkage or population-level co-occurrence across cells. To improve computational scalability for large datasets, we introduce a concurrent two-pointer scanning strategy for motif-based matching (CTPMScan), enabling efficient assignment of reads to their cells of origin. We further apply this computational framework to the Somatic Mosaicism across Human Tissues (SMaHT) Network. Using benchmarking data from simulated HapMap-derived cell lines, Monopogen 2.0 identified approximately 14,110 somatic mutations, of which 5,025 were validated, while misclassifying only 918 germline variants as somatic. Overall, Monopogen achieved over 80% accuracy in distinguishing somatic from germline variants, compared to less than 18% accuracy for SComatic, even when incorporating demultiplexing information.\nIn summary, Monopogen 2.0 represents a scalable framework for characterizing genetic background in large single-cell cohorts and enables systematic tracking of somatic mutation events at single-cell resolution by leveraging nearby germline variants as internal controls. This approach is broadly applicable across diverse single-cell sequencing platforms and large-scale human tissue atlases.", "keywords": "single cell genomics, genetic variants, germline, somatic", "reviewers": ["Osborne, John D", "Chong, Zechen", "Mosa, Abu S", "Chen, Jake Y", "Garmire, Lana"]}];
    const STORAGE_KEY = "attis_review_scores_v1";

    const reviewerSelect = document.getElementById("reviewerSelect");
    const searchBox = document.getElementById("searchBox");
    const list = document.getElementById("list");
    const metaLine = document.getElementById("metaLine");
    const resetBtn = document.getElementById("resetBtn");
    const exportReviewerBtn = document.getElementById("exportReviewerBtn");
    const exportAllBtn = document.getElementById("exportAllBtn");

    function getState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch (_) {
        return {};
      }
    }

    function setState(next) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    }

    function stateKey(reviewer, abstractId) {
      return `${reviewer}::${abstractId}`;
    }

    function esc(value) {
      return (value || "").replace(/[&<>"]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
    }

    function criterionInput(abstractId, reviewer, field, value) {
      return `<input type="number" min="0" max="10" step="1" data-aid="${abstractId}" data-reviewer="${esc(reviewer)}" data-field="${field}" value="${value ?? ""}" />`;
    }

    function criteriaTotal(entry) {
      const n = (x) => Number.isFinite(Number(x)) ? Number(x) : 0;
      return n(entry.topic_fitness) + n(entry.approach) + n(entry.results) + n(entry.innovation);
    }

    function render() {
      const reviewer = reviewerSelect.value;
      const query = searchBox.value.trim().toLowerCase();
      const state = getState();

      const filtered = ABSTRACTS.filter((a) => {
        if (!a.reviewers.includes(reviewer)) return false;
        if (!query) return true;
        const blob = [a.title, a.pi, a.keywords, a.authors, a.abstract].join(" ").toLowerCase();
        return blob.includes(query);
      });

      metaLine.textContent = `Reviewer: ${reviewer} | Assigned abstracts: ${filtered.length}`;

      if (!filtered.length) {
        list.innerHTML = `<div class="empty">No assigned abstracts matched your current search.</div>`;
        return;
      }

      list.innerHTML = filtered.map((a) => {
        const key = stateKey(reviewer, a.abstract_id);
        const entry = state[key] || {};
        const total = criteriaTotal(entry);
        return `
          <article class="card">
            <div class="card-head">
              <div class="title">${esc(a.title || "(No title)")}</div>
              <div class="chips">
                <span class="chip">Abstract #${esc(a.abstract_id)}</span>
                <span class="chip">PI: ${esc(a.pi || "N/A")}</span>
                <span class="chip">Keywords: ${esc(a.keywords || "N/A")}</span>
              </div>
            </div>
            <div class="card-body">
              <section class="section">
                <h3>Abstract</h3>
                <div class="text-block">${esc(a.abstract || "N/A")}</div>
                <h3 style="margin-top:12px;">Authors</h3>
                <div class="small">${esc(a.authors || "N/A")}</div>
                <h3 style="margin-top:12px;">Affiliations</h3>
                <div class="small">${esc(a.affiliations || "N/A")}</div>
              </section>
              <section class="section">
                <h3>Scoring (0-10 each)</h3>
                <div class="scores">
                  <label>Topic fitness</label>${criterionInput(a.abstract_id, reviewer, "topic_fitness", entry.topic_fitness)}
                  <label>Approach</label>${criterionInput(a.abstract_id, reviewer, "approach", entry.approach)}
                  <label>Results</label>${criterionInput(a.abstract_id, reviewer, "results", entry.results)}
                  <label>Innovation</label>${criterionInput(a.abstract_id, reviewer, "innovation", entry.innovation)}
                </div>
                <div class="total">Total: <span data-total="${a.abstract_id}">${total}</span> / 40</div>
                <h3 style="margin-top:12px;">Optional Notes</h3>
                <textarea class="note" data-note-aid="${a.abstract_id}" data-reviewer="${esc(reviewer)}" placeholder="Short reviewer note...">${esc(entry.note || "")}</textarea>
              </section>
            </div>
          </article>
        `;
      }).join("");
    }

    function clampScore(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      if (n < 0) return 0;
      if (n > 10) return 10;
      return Math.round(n);
    }

    function updateEntry(abstractId, reviewer, field, value) {
      const state = getState();
      const key = stateKey(reviewer, abstractId);
      const entry = state[key] || {};
      entry[field] = value;
      state[key] = entry;
      setState(state);
    }

    function csvEscape(val) {
      const s = String(val ?? "");
      if (s.includes('"') || s.includes(",") || s.includes("\n")) {
        return `"${s.replace(/"/g, '""')}"`;
      }
      return s;
    }

    function downloadCsv(filename, rows) {
      const content = rows.map((r) => r.map(csvEscape).join(",")).join("\n");
      const blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportRows(targetReviewer = null) {
      const state = getState();
      const rows = [[
        "Reviewer",
        "Abstract ID",
        "PI",
        "Title",
        "Topic fitness",
        "Approach",
        "Results",
        "Innovation",
        "Total",
        "Note"
      ]];

      for (const a of ABSTRACTS) {
        const reviewers = targetReviewer ? [targetReviewer] : a.reviewers;
        for (const reviewer of reviewers) {
          if (!a.reviewers.includes(reviewer)) continue;
          const entry = state[stateKey(reviewer, a.abstract_id)] || {};
          const total = criteriaTotal(entry);
          rows.push([
            reviewer,
            a.abstract_id,
            a.pi,
            a.title,
            entry.topic_fitness ?? "",
            entry.approach ?? "",
            entry.results ?? "",
            entry.innovation ?? "",
            total,
            entry.note ?? ""
          ]);
        }
      }
      return rows;
    }

    reviewerSelect.innerHTML = REVIEWERS.map((r) => `<option value="${esc(r)}">${esc(r)}</option>`).join("");

    reviewerSelect.addEventListener("change", render);
    searchBox.addEventListener("input", render);

    list.addEventListener("input", (e) => {
      const t = e.target;
      if (t.matches("input[type='number'][data-aid][data-reviewer][data-field]")) {
        const v = clampScore(t.value);
        t.value = v;
        updateEntry(t.dataset.aid, t.dataset.reviewer, t.dataset.field, v);
        const state = getState();
        const entry = state[stateKey(t.dataset.reviewer, t.dataset.aid)] || {};
        const totalEl = document.querySelector(`[data-total="${t.dataset.aid}"]`);
        if (totalEl) totalEl.textContent = criteriaTotal(entry);
      }
      if (t.matches("textarea[data-note-aid][data-reviewer]")) {
        updateEntry(t.dataset.noteAid, t.dataset.reviewer, "note", t.value);
      }
    });

    resetBtn.addEventListener("click", () => {
      const reviewer = reviewerSelect.value;
      if (!confirm(`Reset all saved scores for ${reviewer}?`)) return;
      const state = getState();
      for (const a of ABSTRACTS) {
        delete state[stateKey(reviewer, a.abstract_id)];
      }
      setState(state);
      render();
    });

    exportReviewerBtn.addEventListener("click", () => {
      const reviewer = reviewerSelect.value;
      const rows = exportRows(reviewer);
      const safeName = reviewer.replace(/[^a-z0-9]+/gi, "_");
      downloadCsv(`ATTIS_review_scores_${safeName}.csv`, rows);
    });

    exportAllBtn.addEventListener("click", () => {
      const rows = exportRows(null);
      downloadCsv("ATTIS_review_scores_all.csv", rows);
    });

    render();
  </script>
</body>
</html>
